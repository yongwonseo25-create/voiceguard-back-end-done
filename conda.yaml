# conda.yaml — Robocorp 스캐폴딩 설정
# 설계도 결단 2: Cloud Run 리눅스 컨테이너 브라우저 의존성 완전 자동화
#
# 이 파일로 "로컬에서만 되고 서버에서 안 됨" 버그를 구조적으로 차단한다.
# 배포 전 `rcc holotree variables conda.yaml`로 환경 검증 필수.
#
# 실행 환경: Cloud Run (linux/amd64)
# - Playwright 브라우저 바이너리 자동 설치
# - Node.js 엔진 자동 포함
# - X11/폰트/공유 객체 의존성 선언으로 headless 브라우저 즉시 구동 가능

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - nodejs=18
  - pip:
    # RPA 스캐폴딩
    - robotframework==7.0
    - robotframework-playwright==0.21.0

    # Playwright 엔진 (브라우저 바이너리 자동 설치)
    - playwright==1.44.0

    # 봉투 암호화 의존성
    - cryptography==42.0.5
    - google-cloud-secret-manager==2.20.0
    - google-cloud-kms==2.24.0

    # HTTP 클라이언트 (Tier 1/2 어댑터)
    - httpx==0.27.0

    # 데이터 모델 및 유효성 검증
    - pydantic==2.7.1

    # GCP Cloud Run OIDC Workload Identity
    - google-auth==2.29.0
    - google-auth-httplib2==0.2.0

    # 로깅 및 모니터링
    - structlog==24.1.0

# Playwright 브라우저 설치 후처리
# Cloud Run Dockerfile에서 아래 명령 실행 필요:
#   RUN playwright install --with-deps chromium
#   RUN playwright install-deps
#
# 이를 통해 linux/amd64에서 headless chromium이 즉시 구동된다.

rccEnabled: true
