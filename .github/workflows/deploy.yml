# ══════════════════════════════════════════════════════════════════
# Voice Guard — 완전 자동 배포 파이프라인 (GitHub Actions)
#
# 트리거: main 브랜치에 git push 하는 순간 자동 실행
# 흐름:  백엔드 Docker 빌드 → Cloud Run 배포 → URL 추출
#        → 프론트엔드 빌드(API URL 주입) → Firebase Hosting 배포
#
# 사전 준비 (1회): scripts/bootstrap_gcp.sh 실행 후
#   GitHub > Settings > Secrets에 다음 2개만 등록
#   - GCP_SA_KEY            : bootstrap이 출력하는 JSON (base64)
#   - FIREBASE_SERVICE_ACCOUNT : bootstrap이 출력하는 JSON
# ══════════════════════════════════════════════════════════════════

name: Deploy Voice Guard

on:
  push:
    branches: [main]
  workflow_dispatch:          # 수동 트리거 버튼

env:
  GCP_PROJECT:   voice-guard-pilot
  GCP_REGION:    asia-northeast3
  SERVICE_NAME:  voice-guard-api
  IMAGE_REPO:    asia-northeast3-docker.pkg.dev/voice-guard-pilot/voice-guard/api
  FIREBASE_PROJECT: voice-guard-pilot

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: 백엔드 → Cloud Run
  # ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: "Backend → Cloud Run"
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get_url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud 설치
        uses: google-github-actions/setup-gcloud@v2

      - name: Artifact Registry API 활성화 및 저장소 준비
        run: |
          gcloud services enable artifactregistry.googleapis.com \
            --project=${{ env.GCP_PROJECT }} --quiet || true
          gcloud artifacts repositories describe voice-guard \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} --quiet 2>/dev/null \
          || gcloud artifacts repositories create voice-guard \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --description="Voice Guard API images" \
            --quiet

      - name: Docker 인증 설정
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Docker 이미지 빌드 & 푸시
        run: |
          docker build \
            -t ${{ env.IMAGE_REPO }}:${{ github.sha }} \
            -t ${{ env.IMAGE_REPO }}:latest \
            ./backend
          docker push ${{ env.IMAGE_REPO }}:${{ github.sha }}
          docker push ${{ env.IMAGE_REPO }}:latest

      - name: Cloud Run 배포
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image     "${{ env.IMAGE_REPO }}:${{ github.sha }}" \
            --region    ${{ env.GCP_REGION }} \
            --platform  managed \
            --allow-unauthenticated \
            --memory    1Gi \
            --cpu       1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout   60 \
            --set-secrets "$(printf '%s' \
              'DATABASE_URL=DATABASE_URL:latest,' \
              'SECRET_KEY=SECRET_KEY:latest,' \
              'B2_KEY_ID=B2_KEY_ID:latest,' \
              'B2_APPLICATION_KEY=B2_APPLICATION_KEY:latest,' \
              'B2_BUCKET_NAME=B2_BUCKET_NAME:latest,' \
              'B2_ENDPOINT_URL=B2_ENDPOINT_URL:latest,' \
              'GEMINI_API_KEY=GEMINI_API_KEY:latest,' \
              'GEMINI_MODEL=GEMINI_MODEL:latest,' \
              'NOTION_API_KEY=NOTION_API_KEY:latest,' \
              'NOTION_DATABASE_ID=NOTION_DATABASE_ID:latest,' \
              'NOTION_HANDOVER_DB_ID=NOTION_HANDOVER_DB_ID:latest,' \
              'NOTION_CARE_RECORD_DB_ID=NOTION_CARE_RECORD_DB_ID:latest,' \
              'NOTION_HANDOVER_TITLE_PROP=NOTION_HANDOVER_TITLE_PROP:latest,' \
              'SOLAPI_API_KEY=SOLAPI_API_KEY:latest,' \
              'SOLAPI_API_SECRET=SOLAPI_API_SECRET:latest,' \
              'KAKAO_SENDER_KEY=KAKAO_SENDER_KEY:latest,' \
              'ALIMTALK_TPL_NT1=ALIMTALK_TPL_NT1:latest,' \
              'ALIMTALK_TPL_NT2=ALIMTALK_TPL_NT2:latest,' \
              'ALIMTALK_TPL_NT3=ALIMTALK_TPL_NT3:latest,' \
              'ADMIN_PHONE=ADMIN_PHONE:latest,' \
              'DEFAULT_FACILITY_PHONE=DEFAULT_FACILITY_PHONE:latest,' \
              'ALIMTALK_OVERDUE_MINUTES=ALIMTALK_OVERDUE_MINUTES:latest,' \
              'APP_ENV=APP_ENV:latest,' \
              'ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest')" \
            --quiet

      - name: Cloud Run URL 추출
        id: get_url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ 백엔드 배포 완료: $URL"

  # ────────────────────────────────────────────────────────────────
  # JOB 2: 프론트엔드 → Firebase Hosting
  # ────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "Frontend → Firebase Hosting"
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout (서브모듈 포함)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "FRONT END/package-lock.json"

      - name: 의존성 설치
        working-directory: "FRONT END"
        run: npm ci

      - name: 프로덕션 빌드
        working-directory: "FRONT END"
        run: |
          npm run build
          echo "✅ 프론트엔드 빌드 완료"

      - name: Firebase Hosting 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT }}
          channelId: live

      - name: 배포 완료 보고
        run: |
          echo "════════════════════════════════════"
          echo "✅ 배포 완료!"
          echo "프론트:  https://voice-guard-pilot.web.app"
          echo "백엔드:  ${{ needs.deploy-backend.outputs.api_url }}"
          echo "════════════════════════════════════"
