steps:

  # ── Step 0: 보안 스캔용 의존성 설치 ─────────────────────────────
  - name: 'python:3.12-slim'
    id: 'install-deps'
    entrypoint: pip
    args:
      - 'install'
      - '--no-cache-dir'
      - '-r'
      - 'requirements-api.txt'
      - 'bandit[toml]>=1.7.0'
      - 'safety>=3.0.0'
      - 'pytest>=7.0'
      - 'pytest-asyncio>=0.21'
      - 'httpx>=0.28'

  # ── Step 1: Bandit 정적 보안 스캔 (HIGH 발견 시 빌드 즉시 중단) ──
  # HIGH 등급 취약점 1건이라도 발견 = exit 1 → 이후 모든 스텝 차단
  - name: 'python:3.12-slim'
    id: 'security-scan'
    waitFor: ['install-deps']
    entrypoint: bandit
    args:
      - '-r'
      - '.'
      - '-ll'                     # LOW 이상 리포트
      - '--severity-level'
      - 'high'                    # HIGH 발견 시 exit 1 → 빌드 중단
      - '--exclude'
      - './.venv,./node_modules,./evaluator_audit,./test_*.py'

  # ── Step 2: Safety 의존성 CVE 체크 ──────────────────────────────
  # 알려진 CVE 발견 시 exit 1 → 빌드 중단
  - name: 'python:3.12-slim'
    id: 'cve-check'
    waitFor: ['install-deps']
    entrypoint: safety
    args:
      - 'check'
      - '--full-report'

  # ── Step 3: 통합 테스트 스위트 (보안 스캔 통과 후에만 실행) ─────
  # security-scan + cve-check 양쪽 통과 시에만 실행 (waitFor 체인)
  # 운영 DB와 완전 분리된 DATABASE_URL_TEST Secret 사용
  - name: 'python:3.12-slim'
    id: 'test-suite'
    waitFor: ['security-scan', 'cve-check']
    entrypoint: pytest
    args:
      - 'test_care_record_e2e.py'
      - 'test_ai_pipeline.py'
      - '-x'                      # 첫 번째 실패 시 즉시 중단
      - '-v'
    env:
      - 'DATABASE_URL=$$DATABASE_URL_TEST'
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY'
      - 'APP_CHECK_DEV_MODE=true'
    secretEnv:
      - 'DATABASE_URL_TEST'
      - 'GEMINI_API_KEY'

  # ── Step 4: Docker 이미지 빌드 (테스트 통과 후에만 실행) ─────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    waitFor: ['test-suite']
    args:
      - 'build'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:$BUILD_ID'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:latest'
      - '.'

  # ── Step 5-A: Artifact Registry 푸시 ($BUILD_ID 태그) ────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-build-id'
    waitFor: ['docker-build']
    args:
      - 'push'
      - 'asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:$BUILD_ID'

  # ── Step 5-B: Artifact Registry 푸시 (latest 태그) ───────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    waitFor: ['docker-build']
    args:
      - 'push'
      - 'asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:latest'

  # ── Step 6: Cloud Run 배포 (양쪽 푸시 완료 후) ───────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push-build-id', 'push-latest']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voice-guard-api'
      - '--image=asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:$BUILD_ID'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=60'
      - >-
        --set-secrets=DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,
        APP_ENV=APP_ENV:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,
        B2_KEY_ID=B2_KEY_ID:latest,B2_APPLICATION_KEY=B2_APPLICATION_KEY:latest,
        B2_BUCKET_NAME=B2_BUCKET_NAME:latest,B2_ENDPOINT_URL=B2_ENDPOINT_URL:latest,
        OPENAI_API_KEY=OPENAI_API_KEY:latest,
        GEMINI_API_KEY=GEMINI_API_KEY:latest,GEMINI_MODEL=GEMINI_MODEL:latest,
        NOTION_API_KEY=NOTION_API_KEY:latest,NOTION_DATABASE_ID=NOTION_DATABASE_ID:latest,
        NOTION_HANDOVER_DB_ID=NOTION_HANDOVER_DB_ID:latest,
        NOTION_CARE_RECORD_DB_ID=NOTION_CARE_RECORD_DB_ID:latest,
        NOTION_HANDOVER_TITLE_PROP=NOTION_HANDOVER_TITLE_PROP:latest,
        SOLAPI_API_KEY=SOLAPI_API_KEY:latest,SOLAPI_API_SECRET=SOLAPI_API_SECRET:latest,
        KAKAO_SENDER_KEY=KAKAO_SENDER_KEY:latest,ALIMTALK_TPL_NT1=ALIMTALK_TPL_NT1:latest,
        ALIMTALK_TPL_NT2=ALIMTALK_TPL_NT2:latest,ALIMTALK_TPL_NT3=ALIMTALK_TPL_NT3:latest,
        ADMIN_PHONE=ADMIN_PHONE:latest,DEFAULT_FACILITY_PHONE=DEFAULT_FACILITY_PHONE:latest,
        ALIMTALK_OVERDUE_MINUTES=ALIMTALK_OVERDUE_MINUTES:latest,
        FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,
        FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,
        INTERNAL_API_SECRET=INTERNAL_API_SECRET:latest
      - '--quiet'

# ── 산출물 이미지 목록 ────────────────────────────────────────────
images:
  - 'asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:$BUILD_ID'
  - 'asia-northeast3-docker.pkg.dev/upbeat-aura-484502-r2/voice-guard/api:latest'

# ── Secret Manager 연동 (보안 스캔 전용 시크릿) ───────────────────
# DATABASE_URL_TEST: 테스트 전용 DB — 운영 DB(DATABASE_URL)와 완전 분리 필수
availableSecrets:
  secretManager:
    - versionName: projects/upbeat-aura-484502-r2/secrets/DATABASE_URL_TEST/versions/latest
      env: 'DATABASE_URL_TEST'
    - versionName: projects/upbeat-aura-484502-r2/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'
